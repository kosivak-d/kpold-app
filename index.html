<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Προθεσμίες ΚΠολΔ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;min-height:100vh;padding:16px}
.header{background:linear-gradient(135deg,#1e3a5f,#2d6a9f);border-radius:12px;padding:16px 20px;margin-bottom:14px;color:white;display:flex;justify-content:space-between;align-items:center}
.header-title{font-size:19px;font-weight:700}
.header-count{font-size:12px;opacity:.8;margin-top:2px}
.btn-new{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.5);color:white;border-radius:8px;padding:8px 14px;cursor:pointer;font-weight:700;font-size:13px}

/* ΔΙΟΡΘΩΜΕΝΗ ΜΠΑΡΑ ΑΝΑΖΗΤΗΣΗΣ ΜΕ FLEXBOX */
.search-wrap{
  display: flex;
  align-items: center;
  background: white;
  border: 1.5px solid #cbd5e1;
  border-radius: 8px;
  padding: 0 14px;
  margin-bottom: 10px;
  height: 44px;
}
.search-icon{
  color: #64748b;
  font-size: 14px;
  margin-right: 10px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
}
.search-input{
  width: 100%;
  border: none !important;
  outline: none !important;
  font-size: 14px;
  font-family: inherit;
  padding: 0 !important;
  background: transparent;
}

input[type=text],textarea,select,input[type=date]{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #cbd5e1;font-size:14px;outline:none;font-family:inherit}
.cats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.cat-btn{padding:5px 11px;border-radius:20px;border:none;font-size:11px;font-weight:600;cursor:pointer;background:#e2e8f0;color:#475569}
.cat-btn.active{background:#1e3a5f;color:white}
.count{font-size:12px;color:#64748b;margin-bottom:10px}
.cards{display:flex;flex-direction:column;gap:8px}
.card {background:white;border-radius:10px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.06);transition: all 0.2s ease;}
.card-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.card-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;cursor:pointer}
.art-badge{color:white;border-radius:6px;padding:3px 7px;font-size:11px;font-weight:700;white-space:nowrap}
.card-key{font-size:13px;font-weight:600;color:#1e293b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-actions{display:flex;gap:5px;flex-shrink:0}
.btn-edit{background:#f1f5f9;border:none;border-radius:6px;padding:5px 8px;cursor:pointer;font-size:13px}
.btn-del{background:#fef2f2;border:none;border-radius:6px;padding:5px 8px;cursor:pointer;font-size:13px}
.card-meta{margin-top:6px;cursor:pointer}
.cat-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.card-body{margin-top:10px;padding-top:10px;border-top:1px solid #f1f5f9;font-size:13px;color:#334155;line-height:1.6;display:none}
.card-body.open{display:block}
.law-text-box{margin-top:12px;padding:12px;background:#fdfdfd;border:1px solid #e2e2f0;border-radius:8px;border-left:3px solid #64748b}
.law-title{font-size:11px;font-weight:700;color:#475569;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.law-content{font-size:12.5px;color:#334155;white-space:pre-line;font-style:italic;background:#fafafa;padding:8px;border-radius:4px;line-height:1.5}
.footer{text-align:center;font-size:11px;color:#94a3b8;margin-top:20px;padding-top:12px;border-top:1px solid #e2e8f0}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:white;border-radius:12px;padding:24px;max-width:420px;width:100%;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;margin-bottom:16px;color:#1e3a5f}
.field{margin-bottom:14px}
.field label{font-size:12px;font-weight:700;color:#475569;display:block;margin-bottom:5px}
textarea{min-height:80px;resize:vertical}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.btn-save{flex:1;padding:11px;background:#1e3a5f;color:white;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer}
.btn-cancel{flex:1;padding:11px;background:#e2e8f0;color:#475569;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer}
.del-modal{background:white;border-radius:12px;padding:28px 24px;max-width:300px;width:100%;text-align:center}
.btn-del-confirm{flex:1;padding:10px;background:#ef4444;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer}
.toast{display:none;position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1e3a5f;color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.show{display:block}
.empty{text-align:center;color:#94a3b8;padding:40px;background:white;border-radius:10px}
select{background:white}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Η εφαρμογή είναι πλέον μόνο για ανάγνωση: αφαιρέθηκαν οι φόρμες προσθήκης/επεξεργασίας/διαγραφής. -->

<div class="header">
  <div><div class="header-title">⚖️ Προθεσμίες ΚΠολΔ</div><div class="header-count" id="totalCount"></div></div>
</div>

<!-- ΔΙΟΡΘΩΜΕΝΗ ΔΟΜΗ ΜΠΑΡΑΣ -->
<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input type="text" class="search-input" id="searchInput" placeholder="Αναζήτηση με άρθρο ή λέξη-κλειδί (χωρίς τόνους)..." oninput="render()">
</div>

<div class="cats" id="catBtns"></div>
<div class="count" id="resultCount"></div>
<div class="cards" id="cards"></div>
<div class="footer">Πάντα να ελέγχεται το πρωτότυπο κείμενο του νόμου</div>

<script>
const CAT_COLORS={
  "Γενικές Διατάξεις":"#4f46e5",
  "Αγωγή / Κλήτευση":"#3b82f6",
  "Τακτική Διαδικασία":"#6b7280",
  "Έφεση":"#8b5cf6",
  "Αναίρεση":"#7c3aed",
  "Ανακοπή Ερημοδικίας":"#ec4899",
  "Αναψηλάφηση":"#f59e0b",
  "Ανακοπή":"#ef4444",
  "Απόδειξη / Μάρτυρες":"#10b981",
  "Ασφαλιστικά Μέτρα":"#06b6d4",
  "Διαταγή Πληρωμής":"#84cc16",
  "Εκούσια Δικαιοδοσία":"#db2777",
  "Διαιτησία":"#059669",
  "Αναγκαστική Εκτέλεση":"#f97316"
};
const getColor=c=>CAT_COLORS[c]||"#94a3b8";

const DEFAULT=[
  {id:1,article:"27 § 2",key:"2 έτη",text:"Διαφορές που αφορούν τη διανομή της εταιρικής περιουσίας μετά τη διάλυση και εκκαθάριση της εταιρείας — αποκλειστική αρμοδιότητα του δικαστηρίου της έδρας εντός 2 ετών από την περάτωση της διανομής.",lawText:"« 2. Στην Αρμοδιότητα του δικαστηρίου που ορίζει η παρ. 1 υπάγονται και\nοι διαφορές που δημιουργούνται μετά τη διάλυση και την εκκαθάριση της\nεταιρίας και αφορούν τη διανομή της εταιρικής περιουσίας, εφόσον η\nαγωγή ασκηθεί μέσα σε δύο χρόνια από την περάτωση της διανομής.»",category:"Γενικές Διατάξεις"},
  {id:2,article:"30 § 2",key:"2 έτη",text:"Απαιτήσεις μεταξύ κληρονόμων ή τρίτων λόγω χρεών της κληρονομίας — αποκλειστική αρμοδιότητα του δικαστηρίου της κληρονομίας για 2 έτη από τον θάνατο του κληρονομουμένου.",lawText:"«2. Απαιτήσεις μεταξύ των κληρονόμων έως τη διανομή της κληρονομίας, απαιτήσεις τρίτων εξαιτίας χρεών του κληρονομουμένου ή της κληρονομίας, καθώς και εμπράγματες απαιτήσεις για κινητά που δεν περιλαμβάνονται στην παρ. 1 υπάγονται, για δύο χρόνια από το θάνατο του\nκληρονομουμένου, στην αποκλειστική Αρμοδιότητα του δικαστηρίου, στην περιφέρεια του οποίου είχε αυτός την κατοικία του και, αν δεν είχε κατοικία, τη διαμονή του..»",category:"Γενικές Διατάξεις"},
  {id:3,article:"97 § 3",key:"5 έτη",text:"Ισχύς γενικής πληρεξουσιότητας — παύει να ισχύει μετά από 5 έτη από τη χορήγησή της.",lawText:"«3. Η πληρεξουσιότητα για όλες τις δίκες παύει να ισχύει μετά πέντε χρόνια από τη χορήγησή της..»",category:"Γενικές Διατάξεις"},
  {id:4,article:"134Α § 2",key:"1 έτος",text:"Επαναφορά πραγμάτων επί διεθνούς επίδοσης (ερήμην απόφαση) — αποκλείεται μετά την πάροδο 1 έτους από την έκδοση της απόφασης.",lawText:"«2. Με την επιφύλαξη των κανόνων του ευρωπαϊκού δικονομικού δικαίου ή πολυμερούς ή διμερούς σύμβασης για την επίδοση στην αλλοδαπή, όταν πρέπει να διαβιβαστεί εισαγωγικό δικόγραφο δίκης ή άλλη ισοδύναμη πράξη στο εξωτερικό και ο εναγόμενος ερημοδικήσει, ο δικαστής υποχρεούται, αφού συζητήσει την υπόθεση, να ορίσει προθεσμία για την προσκομιδή της βεβαίωσης επίδοσης στον παραλήπτη και να απόσχει από την έκδοση της απόφασης, μέχρις ότου παρέλθει η προθεσμία και διαπιστωθεί τότε, αν η πράξη επιδόθηκε πράγματι στον εναγόμενο ή όχι. Αν η πράξη επιδόθηκε νόμιμα και εμπρόθεσμα, εκδίδεται απόφαση ερήμην του εναγομένου, διαφορετικά η συζήτηση κηρύσσεται απαράδεκτη. Το δικαστήριο μπορεί, ακόμη και αν δεν έχει παραληφθεί βεβαίωση επίδοσης της πράξης ή άλλο ισοδύναμο έγγραφο στον διαμένοντα στην αλλοδαπή παραλήπτη, να εκδώσει άμεσα απόφαση, αν: α) η πράξη διαβιβάστηκε σύμφωνα με τους εφαρμοζόμενους για τη συγκεκριμένη επίδοση διεθνείς κανόνες ή την παρ. 3 του άρθρου 134, β) από τη διαβίβαση της πράξης έως τη συζήτηση έχει παρέλθει διάστημα τουλάχιστον έξι (6) μηνών και γ) διαπιστωθεί ότι η πράξη διαβιβάστηκε έγκαιρα στο κράτος παραλαβής, ώστε να ήταν δυνατή η περαιτέρω επίδοση στον παραλήπτη. Προσωρινά ή ασφαλιστικά μέτρα, σε περίπτωση επείγουσας ανάγκης, μπορούν να διαταχθούν άμεσα και χωρίς τις προϋποθέσεις αυτές. Αν έχει εκδοθεί κατά τα ανωτέρω απόφαση κατά ερημοδικήσαντος εναγομένου χωρίς βεβαίωση επίδοσης της πράξης στον διαμένοντα στην αλλοδαπή παραλήπτη, ο τελευταίος έχει δικαίωμα επαναφοράς στην προτέρα κατάσταση, αν: α) χωρίς υπαιτιότητά του δεν έλαβε εγκαίρως γνώση του εγγράφου, ώστε να αμυνθεί, ή δεν έλαβε γνώση της απόφασης για να ασκήσει ένδικο μέσο, και β) οι ισχυρισμοί του πιθανολογούνται ως βάσιμοι. Η αίτηση επαναφοράς αποκλείεται μετά από την πάροδο ενός (1) έτους από την έκδοση της απόφασης.»",category:"Γενικές Διατάξεις"},
  {id:5,article:"144 § 1",key:"Επόμενη ημέρα",text:"Υπολογισμός προθεσμιών — Η προθεσμία αρχίζει την επόμενη ημέρα μετά την επίδοση ή μετά το γεγονός που αποτελεί την αφετηρία της.",lawText:"«1. Οι προθεσμίες που ορίζονται από το νόμο ή τα δικαστήρια αρχίζουν από την επόμενη ημέρα μετά την επίδοση ή μετά τη συντέλεση του γεγονότος που αποτελεί την αφετηρία της προθεσμίας και λήγουν στις 7 το βράδυ της τελευταίας ημέρας και αν αυτή είναι κατα το νόμο εξαιρετέα, την ίδια ώρα τη επομένης μη εξαιρετέας ημέρας.»",category:"Γενικές Διατάξεις"},
  {id:6,article:"147 § 2",key:"1-31 Αυγούστου",text:"Εξαίρεση Αυγούστου — Το διάστημα από 1 έως 31 Αυγούστου δεν υπολογίζεται στις περισσότερες δικονομικές προθεσμίες.",lawText:"«2. Το χρονικό διάστημα από 1 έως 31 Αυγούστου δεν υπολογίζεται για τις προθεσμίες των άρθρων 503, 518 παρ. 1,545 παρ. 1 και 2, 564 παρ. 1 και 2, καθώς και των άρθρων 153, 215 παρ. 2, 237 παρ. 1 έως 5 και παρ. 8, 238 παρ. 1,260 παρ. 2, 468 παρ. 1 και 2 εδάφια πρώτο και τρίτο, 598, 632 παρ. 2, 633 παρ. 2, 642, 715 παρ. 5, 729 παρ. 5, 847 παρ. 1,926 παρ. 2, 934 παρ. 1 στοιχ. Α` και β`, 943 παρ. 4, 955, 966 παρ. 2 και 3, 971 παρ. 1, 972 παρ. 1 στοιχ. β`, 973, 974, 979 παρ. 2, 983 παρ. 2, 985 παρ. 1, 986, 988 παρ. 1, 995 και 997 παρ. 2.»",category:"Γενικές Διατάξεις"},
  {id:7,article:"153",key:"30 ημέρες",text:"Αίτηση επαναφοράς των πραγμάτων στην προτέρα κατάσταση — εντός 30 ημερών από την άρση του εμποδίου ή τη γνώση του δόλου.",lawText:"« Η επαναφορά πρέπει να ζητηθεί μέσα σε προθεσμία τριάντα ημερών απο την ημέρα της άρσης του εμποδίου που συνιστούσε την ανώτερη βία ή της γνώσης του δόλου»",category:"Γενικές Διατάξεις"},
  {id:8,article:"160 § 3",key:"1η διαδικαστική πράξη",text:"Πρόταση δικονομικής ακυρότητας — πρέπει να γίνει στην πρώτη διαδικαστική πράξη μετά την προσβαλλόμενη πράξη, αλλιώς καλύπτεται (απαράδεκτο).",lawText:"« 3. Η Πρόταση της ακυρότητας είναι απαράδεκτη,αν δεν γίνει κατά την πρώτη διαδικαστική πράξη, ύστερα απο εκείνη που προσβάλλεται ως άκυρη, εκτός αν νόμος δίνει στο δικαστήριο την εξουσία να εξετάσει αυτεπαγγέλτως αν τηρήθηκε η διάταξη ή αν εξαιτίας της ακυρότητας μπορεί να ζητηθεί αναίρεση.»",category:"Γενικές Διατάξεις"},
  {id:9,article:"165 § 2",key:"15 ημέρες",text:"Παράταση προθεσμίας εγγυοδοσίας — δυνατότητα παράτασης από το δικαστήριο έως 15 ημέρες.",lawText:"«2. Το γραμμάτιο που βεβαιώνει την κατάθεση των τίτλων, η εγγυητική επιστολή της αξιόχρεης τράπεζας και το πιστοποιητικό εγγραφής της υποθήκης πρέπει να κατατεθούν, μέσα στην προθεσμία του άρθρου 162, στη γραμματεία του δικαστηρίου που διέταξε την εγγυοδοσία. Το μονομελές πρωτοδικείο μπορεί να παρατείνει την προθεσμία αυτή για δεκαπέντε ημέρες, δικάζοντας κατά τη διαδικασία των άρθρων 686 επ.»",category:"Γενικές Διατάξεις"},
  {id:10,article:"215 § 2",key:"30 ημέρες",text:"Επίδοση αγωγής στην Τακτική Διαδικασία — εντός 30 ημερών από την κατάθεση (ή 60 ημερών αν ο εναγόμενος διαμένει στο εξωτερικό ή είναι άγνωστης διαμονής).",lawText:"«2. Αν δεν ορίζεται άλλως, η αγωγή επιδίδεται στον εναγόμενο μέσα σε προθεσμία τριάντα (30) ημερών από την κατάθεσή της. Αν η αγωγή πρέπει να επιδοθεί στο εξωτερικό, εντός του διαστήματος αυτού πρέπει να έχει επιδοθεί στον εισαγγελέα, κατά την παρ. 1 του άρθρου 134. Από την επίδοση της αγωγής μπορεί να ξεκινήσει και η διαδικασία διαμεσολάβησης, όπου προβλέπεται υποχρεωτική αρχική συνεδρία διαμεσολάβησης. Αν η αγωγή δεν επιδοθεί νομίμως μέσα στην προθεσμία αυτή, θεωρείται ως μη ασκηθείσα.»",category:"Αγωγή / Κλήτευση"},
  {id:11,article:"220 § 1",key:"30 ημέρες",text:"Εγγραφή αγωγής στα βιβλία διεκδικήσεων (εμπράγματα, υποθήκες, διανομές ακινήτων) — εντός 30 ημερών από την κατάθεση της, αλλιώς είναι απαράδεκτη η συζήτηση.",lawText:"«1. Αγωγές, στις οποίες περιλαμβάνονται και αναγνωριστικές ή ανακοπές εμπράγματες, μικτές ή νομής, εκτός από τα Ασφαλιστικά μέτρα νομής, καθώς και αγωγές διάρρηξης δικαιοπραξίας ως καταδολιευτικής, όταν αφορούν ακίνητα, εγγράφονται ύστερα από αίτηση του ενάγοντος ή ανακόπτοντος στα βιβλία διεκδικήσεων του γραφείου της περιφέρειας όπου βρίσκεται το ακίνητο μέσα σε τριάντα ημέρες από την κατάθεση τους, διαφορετικά απορρίπτονται και αυτεπαγγέλτως ως απαράδεκτες.»",category:"Αγωγή / Κλήτευση"},
  {id:12,article:"228",key:"30 ημέρες",text:"Επίδοση αγωγής πριν τη δικάσιμο (σε ειδικές διαδικασίες) — τουλάχιστον 30 ημέρες πριν (εντός Ελλάδας) ή 60 ημέρες πριν (αν διαμένει στο εξωτερικό).",lawText:"«Αν δεν ορίζεται διαφορετικά, η προθεσμία για την κλήτευση των διαδίκων είναι τριάντα (30) ημέρες και, αν ο διάδικος που καλείται ή κάποιος από τους ομοδίκους διαμένει στο εξωτερικό ή είναι άγνωστης διαμονής, εξήντα (60) ημέρες πριν από τη συζήτηση.»",category:"Αγωγή / Κλήτευση"},
  {id:13,article:"237 § 1",key:"90 ημέρες",text:"Κατάθεση προτάσεων και αποδεικτικών εγγράφων στην Τακτική — εντός 90 ημερών από τη λήξη της προθεσμίας επίδοσης (ή 120 ημερών αν ο εναγόμενος είναι κάτοικος εξωτερικού/άγνωστης διαμονής).",lawText:"«1. Οι προτάσεις των διαδίκων, η έκθεση επίδοσης, τα αποδεικτικά και διαδικαστικά τους έγγραφα και τα πληρεξούσια, στην τακτική διαδικασία, κατατίθενται ενενήντα (90) ημέρες μετά από τη λήξη της προθεσμίας επίδοσης της αγωγής ή της κλήσης και, εφόσον η αγωγή επιδίδεται στην αλλοδαπή, εκατόν είκοσι (120) ημέρες από τη λήξη της ίδιας προθεσμίας για όλους τους διαδίκους.\nΗ προθεσμία αυτή δεν αναστέλλεται κατά το διάστημα της διαδικασίας διαμεσολάβησης. Αν κατά τη διάρκεια της εκκρεμοδικίας και πριν από την κατάθεση προτάσεων οι διάδικοι υπογράψουν συμφωνητικό υπαγωγής σε διαμεσολάβηση, ο διαμεσολαβητής που υπογράφει το συμφωνητικό ενημερώνει το δικαστήριο και η υπόθεση αποσύρεται από το πινάκιο. Κατά τα λοιπά ισχύει η παρ. 1 του άρθρου 9 του ν. 4640/2019 (Α` 190, διορθ. σφαλ. Α` 194). Σε περίπτωση μη υπογραφής πρακτικού επίτευξης συμφωνίας, η υπόθεση επαναφέρεται στο αρμόδιο δικαστήριο με αίτηση στη γραμματεία οποιουδήποτε από τους διαδίκους. Η γραμματεία συντάσσει έκθεση κατάθεσης και προσδιορισμού δικασίμου και ενημερώνει τους διαδίκους με οίκοθεν κλήση, η οποία δύναται να πραγματοποιείται και με ηλεκτρονικά μέσα στη διεύθυνση ηλεκτρονικού ταχυδρομείου των μερών ή των πληρεξούσιων δικηγόρων τους.»",category:"Τακτική Διαδικασία"},
  {id:14,article:"237 § 2",key:"15 ημέρες",text:"Κατάθεση προσθήκης-αντίκρουσης στην Τακτική — εντός 15 ημερών από τη λήξη της προθεσμίας των προτάσεων.",lawText:"«2. Η προσθήκη - αντίκρουση κατατίθεται εντός των επόμενων δεκαπέντε (15) ημερών από τη λήξη της προθεσμίας κατάθεσης των προτάσεων. Στην ίδια προθεσμία κατατίθεται και το δικαστικό ένσημο. Εντός των επόμενων δέκα (10) ημερών από την τελευταία αυτή προθεσμία ορίζεται ο δικαστής ή, επί πολυμελούς δικαστηρίου, η σύνθεση και ο εισηγητής για την εκδίκαση της διαφοράς.»",category:"Τακτική Διαδικασία"},
  {id:15,article:"238 § 1",key:"40 ημέρες",text:"Άσκηση παρεμπιπτουσών αγωγών, ανακοινώσεων και ανταγωγών (Νέος ΚΠολΔ) — εντός 40 ημερών (ή 70 ημερών για εξωτερικό) από το πέρας της προθεσμίας επίδοσης της αγωγής.",lawText:"«1. Παρεμπίπτουσες αγωγές, ανταγωγές, παρεμβάσεις, προσεπικλήσεις και ανακοινώσεις στην περίπτωση του άρθρου 237 κατατίθενται και επιδίδονται σε όλους τους διαδίκους μέσα σε προθεσμία σαράντα (40) ημερών από το πέρας της προθεσμίας επίδοσης της αγωγής. Παρεμβάσεις μετά από προσεπίκληση ή ανακοίνωση κατατίθενται και επιδίδονται σε όλους τους διαδίκους μέσα σε προθεσμία εβδομήντα (70) ημερών από το πέρας της προθεσμίας επίδοσης της αγωγής. Αν ο αρχικός εναγόμενος ή κάποιος από τους ομοδίκους του διαμένει στο εξωτερικό ή είναι άγνωστης διαμονής, οι ως άνω προθεσμίες παρατείνονται σε εβδομήντα (70) και εκατό (100) ημέρες, αντίστοιχα, από το πέρας της προθεσμίας επίδοσης της αγωγής. Η κατάθεση των προτάσεων γίνεται σε προθεσμία ενενήντα (90) ημερών και στην περίπτωση του προηγούμενου εδαφίου σε προθεσμία εκατόν είκοσι (120) ημερών από το πέρας της προθεσμίας επίδοσης της αγωγής. Για την προσθήκη ισχύει η παρ. 2 του άρθρου 237.»",category:"Τακτική Διαδικασία"},
  {id:18,article:"518 § 1",key:"30 ημέρες και 60 ημέρες κάτοικος εξωτερικού ή αγνώστου",text:"Προθεσμία άσκησης έφεσης (με επίδοση) — 30 ημέρες από την επίδοση της απόφασης (ή 60 ημέρες αν ο εκκαλών κατοικεί στο εξωτερικό ή είναι άγνωστης διαμονής).",lawText:"«1. Αν ο εκκαλών διαμένει στην Ελλάδα η προθεσμία της έφεσης είναι τριάντα (30) ημέρες, αν διαμένει στο εξωτερικό ή η διαμονή του είναι άγνωστη, εξήντα (60) ημέρες· και στις δύο περιπτώσεις η προθεσμία αρχίζει από την επίδοση της απόφασης που περατώνει τη δίκη.»",category:"Έφεση"},
  {id:19,article:"518 § 2",key:"1 έτος",text:"Καταχρηστική προθεσμία έφεσης (αν δεν επιδόθηκε) — 1 έτος από τη δημοσίευση της απόφασης (Όπως τροποποιήθηκε με τον Ν. 5221/2025).",lawText:"«2. Αν δεν επιδοθεί η απόφαση, η προθεσμία της έφεσης είναι ένα (1) έτος, που αρχίζει από τη δημοσίευση της απόφασης που περατώνει τη δίκη.» [Ισχύει για αποφάσεις από 1/1/2026]",category:"Έφεση"},
  {id:20,article:"520 § 2",key:"40 ημέρες",text:"Κατάθεση πρόσθετων λόγων έφεσης — εντός 40 ημερών από τη λήξη της προθεσμίας επίδοσης της έφεσης (Βάσει Ν. 5221/2025).",lawText:"«2. Πρόσθετοι λόγοι έφεσης ως προς τα κεφάλαια της απόφασης που έχουν προσβληθεί με την έφεση και εκείνα που αναγκαστικά συνέχονται με τα κεφάλαια αυτά ασκούνται μόνο με ιδιαίτερο δικόγραφο, που, αν δεν ορίζεται άλλως, κατατίθεται στη γραμματεία του δευτεροβάθμιου δικαστηρίου μέσα σε σαράντα (40) ημέρες από τη λήξη της προθεσμίας κλήτευσης του πρώτου εδαφίου της παρ. 2Α του άρθρου 495, προσδιορίζεται στην ίδια δικάσιμο και επιδίδεται μέσα στην ίδια προθεσμία.»",category:"Έφεση"},
  {id:21,article:"523 § 2",key:"40 ημέρες Αντέφεση",text:"Άσκηση αντέφεσης — με ποινή απαραδέκτου εντός 40 ημερών από τη λήξη της προθεσμίας επίδοσης της έφεσης (Βάσει Ν. 5221/2025).",lawText:"«2. Η αντέφεση ασκείται μόνο με ιδιαίτερο δικόγραφο, που, αν δεν ορίζεται άλλως, κατατίθεται στη γραμματεία του δευτεροβάθμιου δικαστηρίου μέσα σε σαράντα (40) ημέρες από τη λήξη της προθεσμίας επίδοσης της έφεσης, προσδιορίζεται στην ίδια δικάσιμο με την έφεση και επιδίδεται μέσα σε τριάντα (30) ημέρες από την άσκησή της.»",category:"Έφεση"},
  {id:22,article:"564 § 1 και 2",key:"30 ημέρες κάτοικος Ελλάδος και 60 ημέρες κάτοικος εξωτερικού ή αγνώστου διαμονής",text:"Προθεσμία άσκησης αναίρεσης (με επίδοση) — 30 ημέρες από την επίδοση της απόφασης.",lawText:"1. Αν ο αναιρεσείων διαμένει στην Ελλάδα, η προθεσμία της αναίρεσης είναι τριάντα ημέρες και αρχίζει από την επίδοση της απόφασης.\n\n  \"2. Αν ο αναιρεσείων διαμένει στο εξωτερικό ή η διαμονή του είναι άγνωστη, η προθεσμία της αναίρεσης είναι εξήντα (60) ημέρες και αρχίζει από την επίδοση της απόφασης.»",category:"Αναίρεση"},
  {id:23,article:"564 § 3",key:"1 έτος",text:"Καταχρηστική προθεσμία αναίρεσης (αν δεν επιδόθηκε) — 1 έτος από τη δημοσίευση της απόφασης (Όπως τροποποιήθηκε με τον Ν. 5221/2025).",lawText:"«3. Αν η απόφαση δεν επιδόθηκε, η προθεσμία της αναίρεσης είναι ένα (1) έτος και αρχίζει από τη δημοσίευση της απόφασης που περατώνει τη δίκη.» [Ισχύει από 1/1/2026]",category:"Αναίρεση"},
  {id:24,article:"569 § 2",key:"60 ημέρες",text:"Κατάθεση πρόσθετων λόγων αναίρεσης — εντός 60 ημερών από την κατάθεση της αναίρεσης (Βάσει Ν. 5221/2025).",lawText:"« 2. Οι πρόσθετοι λόγοι αναίρεσης ως προς τα ίδια κεφάλαια της προσβαλλόμενης απόφασης και τα κεφάλαια εκείνα που αναγκαστικά συνέχονται με αυτά, ασκούνται μόνο με δικόγραφο που κατατίθεται στη γραμματεία του Αρείου Πάγου μέσα σε εξήντα (60) ημέρες από την κατάθεση της αναίρεσης, προσδιορίζονται στην ίδια δικάσιμο με την αναίρεση και επιδίδονται μέσα στην ίδια προθεσμία. Η επίδοση μπορεί να γίνει και στον πληρεξούσιο δικηγόρο του αναιρεσιβλήτου, αν αυτός επισπεύδει τη συζήτηση. Αντίγραφα των προσθέτων λόγων, τα οποία εκδίδονται ατελώς, αφού κατατεθούν από τον αναιρεσείοντα, παραδίδονται από τον γραμματέα του Αρείου Πάγου ένα στον εισηγητή της υπόθεσης για τους σκοπούς του άρθρου 571 και ένα στον Εισαγγελέα του Αρείου Πάγου μέσα στην παραπάνω προθεσμία. Τα ίδια εφαρμόζονται και όταν τη συζήτηση επισπεύδει ο αναιρεσίβλητος ή ο άλλος διάδικος εκτός από τον αναιρεσείοντα.»",category:"Αναίρεση"},
  {id:25,article:"503 § 1",key:"15 ημέρες",text:"Προθεσμία ανακοπής ερημοδικίας — 15 ημέρες από την επίδοση της απόφασης (60 ημέρες αν διαμένει στο εξωτερικό).",lawText:"«1. Αν ο διάδικος που δικάστηκε ερήμην διαμένει στην Ελλάδα, η προθεσμία της ανακοπής είναι δεκαπέντε ημέρες και αρχίζει από την επίδοση της απόφασης.»",category:"Ανακοπή Ερημοδικίας"},
  {id:26,article:"545 § 1, 2, 3, 4",key:"60, 120 κλπ ημέρες",text:"Προθεσμία αναψηλάφησης — 60 ημέρες (ή 120 για εξωτερικό) από την επίδοση της απόφασης.",lawText:"«1. Αν εκείνος που ζητεί την αναψηλάφηση διαμένει στην Ελλάδα, η προθεσμία της αναψηλάφησης είναι εξήντα (60) ημέρες. Ειδικώς στην περίπτωση της περ. 11) του άρθρου 544, η προθεσμία είναι ενενήντα (90) ημέρες.»\n\n2. Αν εκείνος που ζητεί την αναψηλάφηση διαμένει στο εξωτερικό ή η διαμονή του είναι άγνωστη, η προθεσμία της αναψηλάφησης είναι εκατόν είκοσι ημέρες.\n\n  3. Η προθεσμία της αναψηλάφησης αρχίζει:\n\n  α) στην περίπτωση του άρθρου 544 αρ. 1 από την επίδοση της νεώτερης από τις αντιφατικές αποφάσεις,\n\n  β) στην περίπτωση του άρθρου 544 αρ. 2 από την επίδοση της προσβαλλόμενης απόφασης στο διάδικο που έχει γίνει ικανός ή σε εκείνον που νόμιμα τον αντιπροσωπεύει,\n\n  γ) στην περίπτωση του άρθρου 544 αριθ. 4 από την επίδοση της προσβαλλόμενης απόφασης  προσωπικά σε εκείνον που ζητεί την αναψηλάφηση,\n\n  δ) στην περίπτωση του άρθρου 544 αριθ. 6 από το αμετάκλητο της απόφασης με την οποία  αναγνωρίζεται η ψευδομαρτυρία, η ψευδορκία ή η πλαστότητα,\n\n  ε) στην περίπτωση του άρθρου 544 αριθ. 7 από την ημέρα που εκείνος ο οποίος ζητεί την  αναψηλάφηση έμαθε ότι υπάρχουν νέα κρίσιμα έγγραφα,\n\n  στ) στην περίπτωση του άρθρου 544 αριθ. 8 από την ημέρα που εκείνος ο οποίος ζητεί την αναψηλάφηση έμαθε την απόφαση που ανατράπηκε,\n\n  ζ) στις περιπτώσεις του άρθρου 544 αριθ. 3, 5 και 9 από την επίδοση της προσβαλλόμενης απόφασης.\n\n  «η) στην περίπτωση του άρθρου 544 αριθ. 10 από το αμετάκλητο της απόφασης με την οποία\nαναγνωρίζεται η δωροληψία ή η παράβαση καθήκοντος του δικαστή.»\n\n «θ) στην περίπτωση της περ. 11) του άρθρου 544, από την ημερομηνία που καθίσταται οριστική η απόφαση του Ευρωπαϊκού Δικαστηρίου Δικαιωμάτων του Ανθρώπου, σύμφωνα με το άρθρο 44 της Ευρωπαϊκής Σύμβασης των Δικαιωμάτων του Ανθρώπου.»\n\n θ) στην περίπτωση της περ. 12 του άρθρου 544, από την ημερομηνία που καθίσταται αποδεδειγμένα γνωστή σε αυτόν που δικαιούται να ασκήσει αναψηλάφηση η κίνηση διαδικασίας έρευνας ή ενημερωθεί από την Ευρωπαϊκή Επιτροπή ότι η αξίωση την οποία επιδίκασε η διαιτητική απόφαση ενδέχεται να ερείδεται επί πράξεων ή παραλείψεων που δύνανται να συνιστούν κρατική ενίσχυση.»\n\n4. Στις περιπτώσεις της παραγράφου 3 εδάφια δ`, ε`, στ` και η`, η προθεσμία δεν αρχίζει αν δεν επιδοθεί προηγουμένως η προσβαλλόμενη απόφαση, αλλιώς αρχίζει από την επίδοση και το αμετάκλητο ή τη γνώση των κρίσιμων εγγράφων ή της απόφασης που ανατράπηκε. Τα γεγονότα που αποτελούν την αφετηρία της προθεσμίας των εδαφίων αυτών, πρέπει να αποδεικνύονται με έγγραφο ή με δικαστική ομολογία.»",category:"Αναψηλάφηση"},
  {id:27,article:"545 § 5",key:"3 έτη",text:"Καταχρηστική προθεσμία αναψηλάφησης — αν η απόφαση δεν επιδόθηκε, 3 χρόνια από τη δημοσίευση της τελεσίδικης απόφασης.",lawText:"«5. Αν η απόφαση δεν επιδόθηκε, η προθεσμία της αναψηλάφησης είναι τρία χρόνια από τη δημοσίευση της προσβαλλόμενης απόφασης, εφόσον είναι τελεσίδικη ή ανέκκλητη, αλλιώς από την ημέρα που έγινε τελεσίδικη. Στις περιπτώσεις όμως του άρθρου 544 αριθ. 6 και 10, η αναψηλάφηση είναι απαράδεκτη μετά την παρέλευση ενός έτους από τη δημοσίευση της αμετάκλητης απόφασης των ποινικών ή των πολιτικών δικαστηρίων. Η προθεσμία αυτή δεν αρχίζει πριν από την επίδοση της προσβαλλόμενης απόφασης.»\n\n6. Αν εκείνος που δικαιούται να ασκήσει αναψηλάφηση πέθανε, η προθεσμία της αναψηλάφησης αρχίζει μόνο από την επίδοση της απόφασης στους καθολικούς διαδόχους ή τους κληροδόχους.»",category:"Αναψηλάφηση"},
  {id:28,article:"632 § 2",key:"15 εργάσιμες ημέρες. 30 εργάσιμες κάτοικος εξωτερικού ή άγνωστη διαμονή",text:"Ανακοπή κατά διαταγής πληρωμής — 15 εργάσιμες ημέρες από την επίδοση (ή 30 εργάσιμες αν ο οφειλέτης διαμένει στο εξωτερικό).",lawText:"«2. Η προθεσμία για την άσκηση της ανακοπής είναι δεκαπέντε (15) εργάσιμες ημέρες αν η διαταγή πληρωμής έχει εκδοθεί κατά προσώπου που έχει την διαμονή ή την έδρα του στην Ελλάδα και τριάντα (30) εργάσιμες ημέρες αν η διαταγή πληρωμής έχει εκδοθεί κατά προσώπου που έχει τη διαμονή ή την έδρα του στο εξωτερικό ή η διαμονή του είναι άγνωστη. Η ανακοπή εκδικάζεται κατά τη διαδικασία των περιουσιακών διαφορών των άρθρων 614 επ.»",category:"Ανακοπή"},
  {id:29,article:"633 § 2",key:"15 εγάσιμες ημέρες",text:"Δεύτερη ανακοπή κατά διαταγής πληρωμής — εντός 15 εργάσιμων ημερών από τη δεύτερη επίδοση της διαταγής πληρωμής.",lawText:"«2. Αν δεν έχει ασκηθεί εμπρόθεσμα ανακοπή, εκείνος υπέρ του οποίου έχει εκδοθεί η διαταγή πληρωμής μπορεί να επιδώσει πάλι τη διαταγή στον οφειλέτη, ο οποίος έχει το δικαίωμα να ασκήσει την ανακοπή μέσα σε προθεσμία δεκαπέντε (15) εργασίμων ημερών από τη νέα επίδοση. Η ανακοπή μπορεί να ασκηθεί και πριν από την ως άνω δεύτερη επίδοση. Αν περάσει άπρακτη και η παραπάνω προθεσμία, η διαταγή πληρωμής έχει συνέπειες δεδικασμένου και είναι δυνατό να προσβληθεί μόνο με αναψηλάφηση.»",category:"Ανακοπή"},
  {id:30,article:"642",key:"15 εργάσιμες ημέρες",text:"Ανακοπή κατά διαταγής απόδοσης χρήσης μισθίου 15 εργάσιμες ημέρες",lawText:"« Ο καθ’ ου η διαταγή δικαιούται να ασκήσει ανακοπή ενώπιον του καθ’ ύλην αρμοδίου για την εκδίκαση της αγωγής απόδοσης του μισθίου δικαστηρίου, μέσα σε προθεσμία δεκαπέντε (15) εργάσιμων ημερών από την επίδοση της διαταγής. Η ανακοπή εκδικάζεται ως μισθωτική διαφορά.»",category:"Ανακοπή κατά διαταγή απόδοσης μισθίου"},
  {id:31,article:"637",key:"15 ημέρες, 3 μήνες",text:"15 τουλάχιστον ημέρες πριν από την κατάθεση της αίτησης  έγγραφη όχληση με δικαστικό επιμελητή. Σε λήξη μίσθωσης ορισμένου χρόνου, απαιτείται εξώδικη πρόσκληση τουλάχιστον 3 μήνες πριν από τη λήξη.",lawText:"«Κατά τις διατάξεις των άρθρων 638 έως 645, στις περιπτώσεις καθυστέρησης του μισθώματος από δυστροπία, αν η έναρξη της μίσθωσης, αποδεικνύεται εγγράφως, και εφόσον έχει επιδοθεί έγγραφη όχληση με δικαστικό επιμελητή δεκαπέντε (15) τουλάχιστον ημέρες πριν από την κατάθεση της αίτησης, μπορεί να ζητηθεί η έκδοση διαταγής απόδοσης της χρήσης μισθίου ακινήτου. Η καταβολή των μισθωμάτων εντός του δεκαπενθήμερου, αποδεικνυόμενη εγγράφως, αποκλείει την έκδοση διαταγής απόδοσης της χρήσης του μισθίου, εκτός αν υπάρχει επανειλημμένη καθυστέρηση από δυστροπία. Επίδοση έγγραφης όχλησης απαιτείται μόνο την πρώτη φορά. Διαταγή απόδοσης της χρήσης μισθίου μπορεί να ζητηθεί και σε περίπτωση παρέλευσης του ορισμένου χρόνου διάρκειάς της, καθώς και στην περίπτωση λήξης της διάρκειας μίσθωσης ορισμένου χρόνου που κατέστη αορίστου μετά τη λήξη της, αν αποδεικνύονται εγγράφως τόσο η έναρξη, όσο και η λήξη της μίσθωσης. Στην περίπτωση του προηγούμενου εδαφίου, προϋπόθεση της έκδοσης της διαταγής αποτελεί και η επίδοση από τον εκμισθωτή εξώδικης πρόσκλησης απόδοσης του μισθίου, τουλάχιστον τρεις (3) μήνες πριν από την παρέλευση του ορισμένου χρόνου διάρκειάς της ή επί μισθώσεως που έχει καταστεί αορίστου χρόνου μετά τη λήξη της, τουλάχιστον τρεις (3) μήνες πριν από την υποβολή της αίτησης για την έκδοση της διαταγής απόδοσης.»",category:"Διαταγή απόδοσης μισθίου"},
  {id:32,article:"630Α",key:"2 μήνες",text:"Επίδοση διαταγής πληρωμής στον οφειλέτη — εντός 2 μηνών από την έκδοσή της, αλλιώς η διαταγή παύει αυτόματα να ισχύει.",lawText:"« Η διαταγή πληρωμής επιδίδεται σε εκείνον κατά του οποίου στρέφεται μέσα σε προθεσμία δύο (2) μηνών από την έκδοσή της. Αν η επίδοση δεν γίνει μέσα στην προθεσμία του προηγούμενου εδαφίου, η διαταγή πληρωμής παύει αυτοδικαίως να ισχύει.»",category:"Διαταγή Πληρωμής"},
  {id:39,article:"715 § 5",key:"30 ημέρες",text:"Άσκηση κύριας αγωγής μετά από συντηρητική κατάσχεση — εντός 30 ημερών από την επίδοση του εγγράφου της κατάσχεσης.",lawText:"« 5. Μέσα σε τριάντα ημέρες από την επίδοση στον οφειλέτη του εγγράφου για την κατάσχεση, ο δανειστής οφείλει να ασκήσει εναντίον του αγωγή\nγια την κύρια απαίτηση, που να απευθύνεται στο καθ` ύλην αρμόδιο δικαστήριο. Αν περάσει άπρακτη η προθεσμία αυτή, αίρεται αυτοδικαίως το\nασφαλιστικό μέτρο. Δεν απαιτείται να ασκηθεί αγωγή, αν έχει ήδη ασκηθεί η αγωγή για την κύρια απαίτηση ή η συντηρητική κατάσχεση έγινε με βάση\nδιαταγή πληρωμής ή αν επιδοθεί διαταγή πληρωμής μέσα στην παραπάνω προθεσμία.»",category:"Ασφαλιστικά Μέτρα"},
  {id:40,article:"800 § 3, 4",key:"1 έτος, 6 μήνες, 3 έτη",text:"'Εφεση, Αναίρεση και  Αναψηλάφηση εναντίον απόφασης που απαγγέλλει την υιοθεσία είναι, αν δεν επιδοθεί η απόφαση, (1) έτος και αρχίζουν σε κάθε περίπτωση από τη δημοσίευση της απόφασης.\nΤριτανακοπή κατά υιοθεσίας — 6 μήνες από τη γνώση της υιοθεσίας και οπωσδήποτε εντός 3 ετών από την τελεσιδικία.",lawText:"«3. Οι προθεσμίες της έφεσης, της αναίρεσης και της Αναψηλάφησης εναντίον απόφασης που απαγγέλλει την υιοθεσία είναι, αν δεν επιδοθεί η απόφαση, ένα έτος και αρχίζουν σε κάθε περίπτωση από τη δημοσίευση της απόφασης.\n\n \"4. Η προθεσμία της τριτανακοπής κατά της απόφασης που τελεί την υιοθεσία είναι έξι (6) μήνες από τη γνώση της υιοθεσίας και σε κάθε περίπτωση τρία (3) έτη από την τελεσιδικία της απόφασης. Ο φυσικός γονέας που, λόγω της εφαρμογής διατάξεων του ουσιαστικού δικαίου, δεν συναίνεσε στην υιοθεσία του παιδιού του έχει το δικαίωμα, προκειμένου να ασκήσει τριτανακοπή κατά της σχετικής δικαστικής απόφασης, να πληροφορείται τα στοιχεία αυτής της απόφασης από την αρμόδια κοινωνική υπηρεσία ή οργάνωση που συνέπραξε στην τέλεση της υιοθεσίας.»",category:"Εκούσια Δικαιοδοσία"},
  {id:41,article:"849 § 2",key:"2 έτη",text:"Τριτανακοπή σε δημόσια πρόσκληση — κατά απόφασης αποκλεισμού δικαιώματος, εντός 2 ετών από την τελευταία δημοσίευση.",lawText:"«2. Η τριτανακοπή ασκείται μέσα σε αποκλειστική προθεσμία δύο (2) ετών, η οποία αρχίζει από την τελευταία δημοσίευση της απόφασης στον τύπο...»",category:"Εκούσια Δικαιοδοσία"},
  {id:42,article:"899 § 2",key:"3 μήνες",text:"Αγώγη ακύρωσης διαιτητικής απόφασης — εντός αποκλειστικής προθεσμίας 3 μηνών από την κοινοποίησή της.",lawText:"«2. Η αγωγή για την ακύρωση της διαιτητικής απόφασης για τους λόγους που αναφέρονται στο άρθρο 897 αριθ. 1 έως 7 ασκείται μέσα σε προθεσμία τριών μηνών από την κοινοποίησή της, διαφορετικά είναι απαρέδεκτη. Σε αγωγή ακύρωσης για τους λόγους που αναφέρονται στο άρθρο 897 αριθ. 8 εφαρμόζονται οι διατάξεις του άρθρου 545»",category:"Διαιτησία"},
  {id:43,article:"926 § 1",key:"3 ημέρες",text:"Αναμονή αναγκαστικής εκτέλεσης — Δεν μπορεί να γίνει καμία πράξη εκτέλεσης πριν περάσουν 3 εργάσιμες ημέρες από την επίδοση της επιταγής.",lawText:"« 1.  \"Μετά την επίδοση της επιταγής δεν μπορεί με ποινή ακυρότητας να γίνει άλλη πράξη εκτέλεσης πριν περάσουν τρεις (3) εργάσιμες ημέρες από\nτην επίδοση\".\nΗ προθεσμία αυτή πρέπει να τηρείται και όταν η αναγκαστική εκτέλεση συνεχίζεται κατά του κληρονόμου ή του κηδεμόνα σχολάζουσας κληρονομίας.»",category:"Αναγκαστική Εκτέλεση"},
  {id:44,article:"926 § 2",key:"1 έτος",text:"Ισχύς επιταγής προς εκτέλεση — Αν περάσει 1 έτος από την επίδοση της επιταγής, δεν μπορεί να βασιστεί σε αυτήν νέα πράξη εκτέλεσης.",lawText:"«2. Οταν περάσει έτος από την επίδοση της επιταγής, δεν μπορεί να γίνει καμιά άλλη πράξη εκτέλεσης που να βασίζεται επάνω σ`αυτήν..»",category:"Αναγκαστική Εκτέλεση"},
  {id:45,article:"934",key:"45 ημέρες, 30 ημέρες",text:"Ανακοπή κατά της εκτέλεσης (προπαρασκευαστικές πράξεις/κατάσχεση) — εντός 45 ημερών από την ημέρα της κατάσχεσης.",lawText:"«1. Ανακοπή σύμφωνα με το άρθρο 933 είναι παραδεκτή:\n\n α) Αν αφορά σε ελαττώματα από τη σύνταξη της επιταγής προς εκτέλεση μέχρι και τη δημοσίευση του αποσπάσματος της κατασχετήριας έκθεσης και την κατάθεση των προβλεπόμενων στην παρ. 2 του άρθρου 955 και στην παρ. 4 του άρθρου 995 εγγράφων στον υπάλληλο του πλειστηριασμού κατά τα άρθρα 955 και 995 ή την εγκυρότητα του εκτελεστού τίτλου ή την απαίτηση, επί κατάσχεσης δε στα χέρια τρίτου μέχρι και την επίδοση του κατασχετήριου εγγράφου στον καθ’ ου, μέσα σε σαράντα πέντε (45) ημέρες από την ημέρα της κατάσχεσης. Σε περίπτωση άμεσης εκτέλεσης, η ανακοπή κατά της επιταγής προς εκτέλεση ασκείται μέσα σε τριάντα (30) ημέρες από την επίδοση της επιταγής.\n\n β) Αν αφορά στην εγκυρότητα της τελευταίας πράξης της εκτέλεσης, μέσα σε τριάντα (30) ημέρες αφότου η πράξη αυτή ενεργηθεί και αν πρόκειται για εκτέλεση για την ικανοποίηση χρηματικών απαιτήσεων, μέσα σε τριάντα (30) ημέρες από την ημέρα του πλειστηριασμού ή αναπλειστηριασμού αν πρόκειται για κινητά, και εξήντα (60) ημέρες αφότου μεταγραφεί η περίληψη της κατακυρωτικής έκθεσης, αν πρόκειται για ακίνητα.\n\n 2. Αν πρόκειται για εκτέλεση για την ικανοποίηση χρηματικών απαιτήσεων, τελευταία πράξη εκτέλεσης είναι η σύνταξη έκθεσης πλειστηριασμού και κατακύρωσης.»",category:"Αναγκαστική Εκτέλεση"},
  {id:47,article:"943 § 6",key:"6 μήνες",text:"Απαίτηση κατά μεσεγγυούχου — Η αξίωση του οφειλέτης για απόδοση των κινητών πραγμάτων παραγράφεται μετά από 6 μήνες.",lawText:"«6. Στην περίπτωση του παρόντος άρθρου η αξίωση εκείνου κατά του οποίου έγινε η εκτέλεση, κατά του μεσεγγυούχου που διορίστηκε από τον δικαστικό επιμελητή, προς απόδοση των κινητών πραγμάτων, παραγράφεται ύστερα από έξι (6) μήνες από την αποβολή του.»",category:"Αναγκαστική Εκτέλεση"},
  {id:48,article:"954 § 2",key:"5 έως 6 μήνες - 30 εργάσιμες ημέρες",text:"Κατάθεση ανακοπής το αργότερο  (30) εργάσιμες ημέρες πριν από την ημέρα του πλειστηριασμού.",lawText:"«2. Η κατασχετήρια έκθεση πρέπει να περιέχει, εκτός από τα ουσιώδη που απαιτούνται από το άρθρο 117 και: α) ακριβή περιγραφή του κατασχεμένου πράγματος, ώστε να μη γεννιέται αμφιβολία για την ταυτότητά του, β) αναφορά της εκτίμησης του κατασχεμένου που έκανε ο δικαστικός επιμελητής ή ο πραγματογνώμονας, γ) τιμή πρώτης προσφοράς που πρέπει να είναι τουλάχιστον τα δύο τρίτα της αξίας, στην οποία εκτιμήθηκε το κατασχεμένο κινητό πράγμα, δ) αναφορά του εκτελεστού τίτλου, στον οποίο βασίζεται η εκτέλεση, της επιταγής που επιδόθηκε στον οφειλέτη και του ποσού για το οποίο γίνεται η κατάσχεση, ε) αναφορά της ημέρας του πλειστηριασμού, η οποία ορίζεται υποχρεωτικά σε πέντε (5) μήνες από την ημέρα περάτωσης της κατάσχεσης και όχι πάντως μετά την παρέλευση έξι (6) μηνών από την ημερομηνία αυτή, του τόπου του πλειστηριασμού, καθώς και του ονόματος του υπαλλήλου του πλειστηριασμού. Εάν η παραπάνω προθεσμία συμπληρώνεται τον Αύγουστο, τότε για τον υπολογισμό της λαμβάνεται υπόψη ο επόμενος μήνας. Στην έκθεση αναφέρονται επίσης οι όροι που τυχόν έθεσε, σχετικά με τον πλειστηριασμό, ο υπέρ ου η εκτέλεση με την κατά το άρθρο 927 εντολή, καθώς επίσης και η τυχόν διενέργειά του ενώπιον συμβολαιογράφου, σε οποιονδήποτε συμβολαιογραφικό σύλλογο της χώρας, αν δεν είναι δυνατό να οριστεί πιστοποιημένος συμβολαιογράφος της πρωτοδικειακής περιφέρειας του τόπου της εκτέλεσης (κατάσχεσης), αδυναμία που βεβαιώνει στην κατασχετήρια έκθεση ο δικαστικός επιμελητής.»\n\n 3. Την κατασχετήρια έκθεση υπογράφουν ο δικαστικός επιμελητής και ο μάρτυρας και αν είναι παρόντες εκείνος υπέρ του οποίου γίνεται και εκείνος κατά του οποίου στρέφεται η εκτέλεση την υπογράφουν και αυτοί. Αν κάποιος από αυτούς αρνηθεί να υπογράψει, η άρνησή του αναφέρεται στην έκθεση.\n\n 4. Ύστερα από ανακοπή του επισπεύδοντος ή του καθ’ ου η εκτέλεση ή οποιουδήποτε άλλου έχει έννομο συμφέρον, το αρμόδιο κατά το άρθρο 933 δικαστήριο, δικάζοντας κατά τη διαδικασία των άρθρων 686 επ., μπορεί να διατάξει τη διόρθωση της έκθεσης και του αποσπάσματος αυτής, ιδίως ως προς την περιγραφή του κατασχεθέντος, την εκτίμηση και την τιμή πρώτης προσφοράς. Η ανακοπή είναι απαράδεκτη, αν δεν κατατεθεί το αργότερο τριάντα (30) εργάσιμες ημέρες πριν από την ημέρα του πλειστηριασμού. Η απόφαση πρέπει να δημοσιεύεται έως τις 12:00 το μεσημέρι της δέκατης πριν από τον πλειστηριασμό ημέρας και αναρτάται την ίδια ημέρα με επιμέλεια της γραμματείας στην ιστοσελίδα δημοσιεύσεων πλειστηριασμών του Δελτίου Δικαστικών Δημοσιεύσεων του Ηλεκτρονικού Εθνικού Φορέα Κοινωνικής Ασφάλισης (e-ΕΦΚΑ). Ελαττώματα ή ελλείψεις που είναι δυνατό να διορθωθούν ή να συμπληρωθούν με την άσκηση ανακοπής της παρούσας δεν προβάλλονται παραδεκτώς με ανακοπή του άρθρου 933.»",category:"Αναγκαστική Εκτέλεση"},
  {id:49,article:"995",key:"διάφορες προθεσμίες",text:"Ορισμός πλειστηριασμού — Ο πλειστηριασμός ορίζεται υποχρεωτικά τουλάχιστον 45 ημέρες από την ημέρα της κατάσχεσης.",lawText:"«1. Αντίγραφο της κατασχετήριας έκθεσης επιδίδεται μόλις περατωθεί η κατάσχεση στον καθ` ου η εκτέλεση, αν ήταν παρών, και αν αυτός αρνηθεί να παραλάβει το έγγραφο που του επιδίδεται, ο επιμελητής συντάσσει έκθεση για την άρνησή του. Αν είναι απών ή δεν είναι δυνατή η άμεση κατάρτιση του αντιγράφου, η επίδοση μπορεί να γίνει σύμφωνα με το Κεφάλαιο Δέκατο Έκτο, περί επιδόσεων. Η επίδοση της κατασχετήριας έκθεσης γίνεται το αργότερο την επομένη της ημέρας που έγινε η κατάσχεση, εφόσον εκείνος κατά του οποίου στρέφεται η εκτέλεση έχει την κατοικία του στην περιφέρεια του δήμου όπου έγινε η κατάσχεση, διαφορετικά μέσα σε οκτώ (8) ημέρες από την κατάσχεση. Η παράλειψη των διατυπώσεων αυτών επιφέρει ακυρότητα. Ως τιμή πρώτης προσφοράς για τον πλειστηριασμό ακινήτου ορίζεται η εμπορική του αξία, όπως αυτή προσδιορίζεται κατά τον χρόνο της κατάσχεσης κατά το π.δ. 59/2016 (Α` 95).»\n\n*** Το δεύτερο εδάφιο αντικαταστάθηκε, το τρίτο εδάφιο προστέθηκε και η παρ. 1\n       διαμορφώθηκε ως άνω με το άρθρο 42 Ν. 5282/2026, ΦΕΚ Α 30/27.02.2026.\n\n 2. Με ποινή ακυρότητας, αντίγραφο της κατασχετήριας έκθεσης επιδίδεται στον υποθηκοφύλακα (κτηματολόγιο) της περιφέρειας όπου βρίσκεται το κατασχεμένο μέσα σε πέντε (5) ημέρες από την κατάσχεση. Αν πρόκειται για πλοία νηολογημένα στην Ελλάδα, η επίδοση γίνεται σε εκείνον που τηρεί το νηολόγιο, όπου είναι γραμμένο το πλοίο, και αν πρόκειται για αεροσκάφη γραμμένα σε μητρώο που τηρείται στην Ελλάδα, η επίδοση γίνεται σε εκείνον που το τηρεί. Ο υποθηκοφύλακας ή όποιος τηρεί το νηολόγιο ή το μητρώο οφείλει να εγγράφει την ίδια ημέρα την κατάσχεση σε ειδικό βιβλίο κατασχέσεων που τηρείται για το σκοπό αυτό και να παραδώσει μέσα σε προθεσμία πέντε (5) ημερών, αφότου κατά τα προαναφερόμενα του έγινε η επίδοση, το σχετικό πιστοποιητικό βαρών στον αρμόδιο για την εκτέλεση δικαστικό επιμελητή, ενώ ο γραμματέας [του ειρηνοδικείου] οφείλει αυθημερόν να καταχωρίσει την κατασχετήρια έκθεση σε ειδικό βιβλίο με αλφαβητικό ευρετήριο, με βάση τα ονοματεπώνυμα των καθ` ων η κατάσχεση.\n\n*** Στην παρ. 2 η αναφορά στο \"ειρηνοδικείο\" νοείται αναφορά στο \"πρωτοδικείο\"\n       από 16.9.2024 με τα άρθρα 49 παρ. 5 και 120 παρ. 1 Ν. 5134/2024, ΦΕΚ Α΄146.\n\n 3. Αν πρόκειται για κατάσχεση ενυπόθηκου κτήματος και η κατάσχεση έγινε κατά του τρίτου, κυρίου ή νομέα, πρέπει να επιδοθεί σ` αυτόν και στον οφειλέτη αντίγραφο της κατασχετήριας έκθεσης, αλλιώς επέρχεται ακυρότητα. Αν η κατάσχεση έγινε κατά του οφειλέτη, πρέπει να επιδοθεί στον τρίτο, κύριο ή νομέα, αντίγραφο της κατασχετήριας έκθεσης, αλλιώς επέρχεται ακυρότητα.\n\n «4. Ο δικαστικός επιμελητής οφείλει, μέσα σε είκοσι (20) ημέρες από την κατάσχεση, να καταθέσει στον υπάλληλο του πλειστηριασμού τον εκτελεστό τίτλο, την έκθεση επίδοσης της επιταγής της εκτέλεσης, την κατασχετήρια έκθεση και τις εκθέσεις επίδοσής της στον οφειλέτη, τον τρίτο κύριο ή νομέα και τον υποθηκοφύλακα ή όποιον τηρεί το νηολόγιο ή το μητρώο, το πιστοποιητικό βαρών, καθώς και, σε έντυπη και ψηφιακή μορφή, την έκθεση εκτίμησης του πιστοποιημένου εκτιμητή του π.δ. 59/2016. Ο υπάλληλος του πλειστηριασμού συντάσσει έκθεση για όλα αυτά. Απόσπασμα της κατασχετήριας έκθεσης, που περιλαμβάνει τα ονοματεπώνυμα του υπέρ ου και του καθ’ ου η εκτέλεση, καθώς και τον αριθμό φορολογικού μητρώου αυτών και, αν πρόκειται για νομικά πρόσωπα, την επωνυμία και τον αριθμό φορολογικού τους μητρώου, συνοπτική περιγραφή του ακινήτου που κατασχέθηκε κατά το είδος, τη θέση, τα όρια και την έκτασή του, με τα συστατικά και όσα παραρτήματα συγκατάσχονται, καθώς και μνεία των υποθηκών ή προσημειώσεων που υπάρχουν επάνω στο ακίνητο, την τιμή της πρώτης προσφοράς, του ποσού για το οποίο γίνεται η κατάσχεση, τους όρους του πλειστηριασμού, που θέτει ο υπέρ ου η εκτέλεση και που γνωστοποιήθηκαν στον δικαστικό επιμελητή με την εντολή για εκτέλεση του άρθρου 927 και το όνομα και τη διεύθυνση του υπαλλήλου του πλειστηριασμού, καθώς και τον τόπο, την ημέρα και την ώρα του πλειστηριασμού, εκδίδεται από τον δικαστικό επιμελητή και δημοσιεύεται με επιμέλεια αυτού μέχρι την δέκατη πέμπτη ημέρα από την κατάσχεση στην ιστοσελίδα δημοσιεύσεων πλειστηριασμών του Δελτίου Δικαστικών Δημοσιεύσεων του Ηλεκτρονικού Εθνικού Φορέα Κοινωνικής Ασφάλισης (e-ΕΦΚΑ). Στο απόσπασμα περιλαμβάνεται και η βεβαίωση του δικαστικού επιμελητή, σχετικά με την αδυναμία ορισμού συμβολαιογράφου της πρωτοδικειακής περιφέρειας του τόπου εκτέλεσης. Το απόσπασμα επιδίδεται μέσα στην ίδια προθεσμία στον τρίτο κύριο ή νομέα και στους ενυπόθηκους δανειστές. Η παράλειψη σύνταξης και δημοσίευσης του αποσπάσματος, κατάθεσης των εγγράφων στον υπάλληλο του πλειστηριασμού και επίδοσης αποσπάσματος στον τρίτο κύριο ή νομέα και στους ενυπόθηκους δανειστές επιφέρει ακυρότητα του πλειστηριασμού. Ο δικαστικός επιμελητής παραδίδει στον υπάλληλο του πλειστηριασμού, σε ηλεκτρονική μορφή, φωτογραφίες του κατασχεθέντος ακινήτου, τις οποίες λαμβάνει κατά την επιτόπια μετάβασή του σε αυτό. Η λήψη τους από τον υπάλληλο του πλειστηριασμού αναφέρεται στην παραπάνω έκθεση. Τα πληροφοριακά στοιχεία, τα οποία περιλαμβάνονται στο απόσπασμα της κατασχετήριας έκθεσης, καθώς και η έκθεση του πιστοποιημένου εκτιμητή και οι φωτογραφίες αναρτώνται από τον υπάλληλο του πλειστηριασμού στο ηλεκτρονικό σύστημα πλειστηριασμού. Εκτός των ανωτέρω πληροφοριακών στοιχείων, ο δικαστικός επιμελητής συγκεντρώνει και όποια άλλα πληροφοριακά στοιχεία και έγγραφα ενδεικτικά της αξίας του κατασχεμένου ακινήτου, όπως οικοδομικές άδειες, τοπογραφικά διαγράμματα και κατόψεις, και τα παραδίδει στον υπάλληλο του πλειστηριασμού ο οποίος τα αναρτά στην ίδια ως άνω ιστοσελίδα το αργότερο τριάντα (30) ημέρες προ του πλειστηριασμού. Όλες οι αρμόδιες δημόσιες υπηρεσίες και οι συμβολαιογράφοι υποχρεούνται να χορηγούν στον δικαστικό επιμελητή τα έγγραφα αυτά.»\n\n*** Η παρ. 4 διαμορφώθηκε ως άνω με ισχύ ΑΠΟ 01.01.2026 δυνάμει των άρθρων 117 και 168\n       παρ. 3 Ν. 5221/2025, ΦΕΚ Α 133/28.07.2025.\n\n5. Εφόσον δεν ορίζεται διαφορετικά, οι διατάξεις των άρθρων 972 και 973 εφαρμόζονται και εδώ.»",category:"Αναγκαστική Εκτέλεση"},
  {id:50,article:"1019",key:"1 έτος, 6 μήνες",text:"Η κατάσχεση ανατρέπεται αν δεν γίνει πλειστηριασμός εντός 1 έτους από την επιβολή της. και (6) μήνες σε αναπληστειριασμό",lawText:"«Η κατάσχεση, εφόσον δεν ακολούθησε πλειστηριασμός μέσα σε ένα έτος αφότου επιβλήθηκε ή αναπλειστηριασμός μέσα σε έξι μήνες από τον πλειστηριασμό, ανατρέπεται, αν το ζητήσει οποιοσδήποτε έννομο συμφέρον,με απόφαση [του ειρηνοδικείου] στην περιφέρεια του οποίου επιβλήθηκε η κατάσχεση, το οποίο δικάζει κατά τη διαδικασία των άρθρων 686 επ. Το δικαστήριο γνωστοποιεί χωρίς υπαίτια καθυστέρηση την απόφαση στον υπάλληλο του πλειστηριασμού που οφείλει να σταματήσει κάθε παραπέρα ενέργεια και να ζητήσει να εγγραφεί σχετική σημείωση στο βιβλίο κατασχέσεων. Η ανατροπή λογίζεται ότι έχει επέλθει ως προς όλους αφότου δημοσιευθεί η απόφαση\n\n***Στην παρ. 1 άρθρου 1019, η αναφορά στο \"ειρηνοδικείο\" νοείται αναφορά στο \"μονομελές\n      πρωτοδικείο\" από 16.9.2024 με τα άρθρα 49 παρ. 4 και 120 παρ. 1 Ν. 5134/2024, ΦΕΚ Α΄146.\n\n   \"2. Στις προθεσμίες που ορίζονται στην προηγούμενη παράγραφο δεν υπολογίζεται το διάστημα από την έκδοση απόφασης \" σύμφωνα με το άρθρο 966  παράγραφοι 3 και 4\" μέχρι την ημέρα του πλειστηριασμού που ορίσθηκε σύμφωνα με αύτην, το διάστημα αναστολής της εκτέλεσης, η οποία χορηγήθηκε με δικαστική απόφαση ή με κοινή συναίνεση εκείνου που επισπεύδει και του οφειλέτη, η οποία βεβαιώνεται με συμβολαιογραφική πράξη, καθώς και ο χρόνος από 1 έως 31 Αυγούστου\".\n\n3.  Αν  πριν από την έκδοση της κατά την παρ.  1 απόφασης είχαν αναγγελθεί δανειστές με τα προσόντα αυτοτελούς  κατάσχεσης, κατά τα άρθρα  972  παρ. 2 εδ. β` και 1006 παρ. 1 εδ. α`, η ανατροπή επέρχεται ως προς αυτούς μόνο αν οι ως άνω προθεσμίες είχαν συμπληρωθεί  και  ως προς  αυτούς από τις αναγγελίες τους. Διαφορετικά, η κατάσχεση ως προς αυτούς διατηρείται και ισχύει αυτοτελής προθεσμία  ανατροπής  της  από την  αναγγελία τους, η προθεσμία όμως αυτή ουδέποτε συμπληρώνεται πριν οπό την παρόδο εξαμήνου από την ανατροπή»",category:"Αναγκαστική Εκτέλεση"},
  {id:51,article:"1020",key:"1 έτος, 5 έτη",text:"Αγωγή διεκδίκησης πλειστηριασθέντος πράγματος — αποκλειστική προθεσμία 1 έτους για κινητά και 5 ετών για ακίνητα.",lawText:"« Αγωγή διεκδίκησης του πράγματος που πλειστηριάστηκε πρέπει να ασκηθεί μέσα σε αποκλειστική προθεσμία, για τα κινητά ενός έτους από τότε που παραδόθηκαν στον υπερθεματιστή, και για τα ακίνητα πέντε ετών από τότε που μεταγράφηκε η περίληψη της κατακυρωτικής έκθεσης.»",category:"Αναγκαστική Εκτέλεση"},
  {id:52,article:"503 § 2",key:"60 ημέρες",text:"60 ημέρες ως άγνωστη διανομή",lawText:"2. Αν ο διάδικος που δικάστηκε ερήμην έχει άγνωστη διανομή, η προθεσμία της ανακοπής είναι εξήντα ημέρες και αρχίζει από την\nτελευταία δημοσίευση κατά το άρθρο 135 παρ. 1 της περίληψης της έκθεσης για την επίδοση της απόφασης. Η περίληψη περιλαμβάνει το όνομα και το επώνυμο, καθώς και την ιδιότητα εκείνου που επιδίδει τα ονόματα, τα επώνυμα και τις κατοικίες των διαδίκων, τον αριθμό και τη χρονολογία της απόφασης, το δικαστήριο που την εξέδωσε και σύντομη αναφορά του διατακτικού της.",category:"Ανακοπή Ερημοδικίας"}
];

// Η εφαρμογή είναι πλέον μόνο για ανάγνωση (read-only): φορτώνει πάντα
// κατευθείαν το DEFAULT, χωρίς καμία εξάρτηση από το localStorage του browser.
// Έτσι αποκλείεται οριστικά κάθε πρόβλημα "παλιάς έκδοσης" σε οποιαδήποτε συσκευή.
let data = DEFAULT;
let activeCat="Όλες",expandedId=null;
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500);}

function cleanString(str) {
  if (!str) return "";
  return str.toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/ς/g, "σ");
}

function getArticleNumber(artStr) {
  if (!artStr) return 0;
  const match = artStr.match(/\d+/);
  return match ? parseInt(match[0], 10) : 0;
}

function render(){
  const q=cleanString(document.getElementById("searchInput").value.trim());
  const cats=["Όλες",...new Set(data.map(d=>d.category))];
  const cb=document.getElementById("catBtns");
  cb.innerHTML=cats.map(c=>`<button class="cat-btn${c===activeCat?" active":""}" onclick="setCat('${c.replace(/'/g,"\\'")}')">${c}</button>`).join("");
  
  data.sort((a, b) => getArticleNumber(a.article) - getArticleNumber(b.article));

  const filtered=data.filter(d=>{
    const mc=activeCat==="Όλες"||d.category===activeCat;
    const searchTarget = cleanString(d.article + " " + d.key + " " + d.text + " " + d.category + " " + (d.lawText || ""));
    const ms=!q || searchTarget.includes(q);
    return mc&&ms;
  });
  
  document.getElementById("totalCount").textContent=data.length+" εγγραφές συνολικά";
  document.getElementById("resultCount").textContent=filtered.length+" βρέθηκαν";
  const col=document.getElementById("cards");
  if(!filtered.length){col.innerHTML='<div class="empty">Δεν βρέθηκαν αποτελέσματα</div>';return;}
  col.innerHTML=filtered.map(d=>{
    const color=getColor(d.category);
    const open=expandedId===d.id;
    return`<div class="card" style="border-left:4px solid ${color};${open?"box-shadow:0 4px 12px rgba(0,0,0,.1)":""}">
      <div class="card-top">
        <div class="card-left" onclick="toggle(${d.id})" style="flex:1">
          <span class="art-badge" style="background:${color}">άρθ. ${d.article}</span>
          <span class="card-key">${d.key}</span>
        </div>
      </div>
      <div class="card-meta" onclick="toggle(${d.id})">
        <span class="cat-badge" style="color:${color};background:${color}18">${d.category}</span>
        <span class="toggle-icon">${open?"▲":"▼"}</span>
      </div>
      <div class="card-body${open?" open":""}">
        <div style="font-weight: 500; margin-bottom: 8px;">${d.text}</div>
        
        <div class="law-text-box">
          <div class="law-title">📝 Αυτούσιο Κείμενο Νόμου (Έλεγχος)</div>
          <div class="law-content">${d.lawText || 'Δεν έχει καταχωρηθεί αυτούσιο κείμενο.'}</div>
        </div>

        <div class="law-text-box" style="margin-top:10px;border-left:4px solid #f59e0b">
          <div class="law-title">💡 Ερμηνεία / Παρατηρήσεις</div>
          <div class="law-content">${d.notes || 'Δεν έχει καταχωρηθεί ερμηνεία ή παρατήρηση ακόμη.'}</div>
        </div>
      </div>
    </div>`;
  }).join("");
}

function setCat(c){activeCat=c;render();}
function toggle(id){expandedId=expandedId===id?null:id;render();}

render();
</script>
</body>
</html>
